<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NYC Property Intelligence — Submit Address</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #0A0A0A;
            --concrete: #F5F5F0;
            --steel: #52525B;
            --orange: #FF6B35;
            --green: #10B981;
            --red: #DC2626;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'JetBrains Mono', monospace;
            background: var(--concrete);
            color: var(--ink);
            min-height: 100vh;
            padding: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
        }
        
        /* Grid background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                repeating-linear-gradient(0deg, transparent, transparent 19px, rgba(0,0,0,0.03) 19px, rgba(0,0,0,0.03) 20px),
                repeating-linear-gradient(90deg, transparent, transparent 19px, rgba(0,0,0,0.03) 19px, rgba(0,0,0,0.03) 20px);
            pointer-events: none;
            z-index: 0;
        }
        
        .container {
            max-width: 600px;
            width: 100%;
            position: relative;
            z-index: 1;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .header {
            background: var(--ink);
            color: var(--concrete);
            padding: 2rem;
            border: 3px solid var(--ink);
            margin-bottom: 3px;
            position: relative;
        }
        
        .header::after {
            content: 'SYSTEM ACTIVE';
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
            font-size: 0.625rem;
            letter-spacing: 0.1em;
            color: var(--green);
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            line-height: 1.1;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }
        
        .subtitle {
            font-size: 0.875rem;
            opacity: 0.7;
            letter-spacing: 0.05em;
        }
        
        .form-container {
            background: white;
            border: 3px solid var(--ink);
            padding: 2rem;
        }
        
        .field {
            margin-bottom: 1.5rem;
        }
        
        label {
            display: block;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
            color: var(--steel);
        }
        
        input, select {
            width: 100%;
            padding: 0.875rem 1rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 1rem;
            border: 2px solid var(--ink);
            background: var(--concrete);
            color: var(--ink);
            transition: all 0.2s;
        }
        
        input:focus, select:focus {
            outline: none;
            background: white;
            border-color: var(--orange);
            box-shadow: 0 0 0 3px rgba(255, 107, 53, 0.1);
        }
        
        select {
            cursor: pointer;
            appearance: none;
            background-image: url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L6 6L11 1' stroke='%230A0A0A' stroke-width='2' stroke-linecap='square'/%3E%3C/svg%3E");
            background-repeat: no-repeat;
            background-position: right 1rem center;
            padding-right: 3rem;
        }
        
        button {
            width: 100%;
            padding: 1rem;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            background: var(--orange);
            color: white;
            border: 3px solid var(--ink);
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: var(--ink);
            transition: left 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        button span {
            position: relative;
            z-index: 1;
        }
        
        button:hover::before {
            left: 0;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 0 var(--ink);
        }
        
        button:active {
            transform: translateY(0);
            box-shadow: 0 3px 0 var(--ink);
        }
        
        button:disabled {
            background: var(--steel);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        button:disabled:hover::before {
            left: -100%;
        }
        
        .status {
            margin-top: 1.5rem;
            padding: 1rem;
            border: 2px solid;
            font-size: 0.875rem;
            display: none;
            animation: slideIn 0.3s;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        
        .status.success {
            background: rgba(16, 185, 129, 0.1);
            border-color: var(--green);
            color: var(--green);
            display: block;
        }
        
        .status.error {
            background: rgba(220, 38, 38, 0.1);
            border-color: var(--red);
            color: var(--red);
            display: block;
        }
        
        .status.processing {
            background: rgba(255, 107, 53, 0.1);
            border-color: var(--orange);
            color: var(--orange);
            display: block;
        }
        
        .footer {
            margin-top: 2rem;
            text-align: center;
            font-size: 0.75rem;
            color: var(--steel);
            letter-spacing: 0.05em;
        }
        
        @media (max-width: 640px) {
            body {
                padding: 1rem;
            }
            
            h1 {
                font-size: 1.5rem;
            }
            
            .header, .form-container {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>NYC PROPERTY<br>INTELLIGENCE</h1>
            <p class="subtitle">AUTOMATED RISK ASSESSMENT SYSTEM</p>
        </div>
        
        <div class="form-container">
            <form id="propertyForm">
                <div class="field">
                    <label for="address">Street Address</label>
                    <input 
                        type="text" 
                        id="address" 
                        name="address" 
                        placeholder="123 Main Street"
                        required
                        autocomplete="off"
                    >
                </div>
                
                <div class="field">
                    <label for="borough">Borough</label>
                    <select id="borough" name="borough" required>
                        <option value="">Select borough...</option>
                        <option value="manhattan">Manhattan</option>
                        <option value="brooklyn">Brooklyn</option>
                        <option value="bronx">Bronx</option>
                        <option value="queens">Queens</option>
                        <option value="staten island">Staten Island</option>
                    </select>
                </div>
                
                <button type="submit">
                    <span>PROCESS ADDRESS</span>
                </button>
            </form>
            
            <div id="status" class="status"></div>
        </div>
        
        <div class="footer">
            POWERED BY NYC OPEN DATA • BBL VERIFICATION SYSTEM
        </div>
    </div>

    <script>
        const form = document.getElementById('propertyForm');
        const status = document.getElementById('status');
        const button = form.querySelector('button');
        
        // REPLACE THIS WITH YOUR ACTUAL N8N WEBHOOK URL
        const WEBHOOK_URL = 'https://YOUR-N8N-URL/webhook/property-intake';
        
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const address = document.getElementById('address').value.trim();
            const borough = document.getElementById('borough').value;
            
            // Reset status
            status.className = 'status processing';
            status.textContent = '⚙️ PROCESSING... Geocoding address and enriching data from 4 NYC databases...';
            button.disabled = true;
            
            try {
                const response = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ address, borough })
                });
                
                if (response.ok) {
                    const data = await response.json();
                    status.className = 'status success';
                    status.textContent = `✓ SUCCESS — Address processed. BBL: ${data.bbl || 'pending'}. Check your Airtable for full report.`;
                    form.reset();
                } else {
                    throw new Error('Request failed');
                }
            } catch (error) {
                status.className = 'status error';
                status.textContent = '✗ ERROR — Could not process address. Please check the address and try again.';
            } finally {
                button.disabled = false;
            }
        });
    </script>
</body>
</html>
